<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>El Fili 1-39</title><style>body{font-family:Arial;background:#eef;padding:20px}.b{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px}button{display:block;width:100%;margin:8px 0;padding:12px}</style></head><body><div class=b><h2>El Filibusterismo 1–39 Challenge</h2><div id=g></div></div><script>const titles=["Sa Kubyerta", "Sa Ilalim ng Kubyerta", "Ang mga Alamat", "Si Kabesang Tales", "Ang Noche Buena ng Isang Kutsero", "Si Basilio", "Si Simoun", "Maligayang Pasko", "Si Pilato", "Kayamanan at Karalitaan", "Los Baños", "Placido Penitente", "Ang Klase sa Pisika", "Sa Bahay ng mga Estudyante", "Ginoong Pasta", "Ang Kapighatian ng Isang Intsik", "Ang Perya sa Quiapo", "Mga Pandaraya", "Ang Mitsa", "Ang Nagpapalagay", "Mga Ayos ng Maynila", "Ang Palabas", "Namatay si Maria Clara", "Mga Pangarap", "Tawanan at Iyakan", "Mga Paskin", "Ang Prayle at ang Pilipino", "Mga Katatakutan", "Mga Huling Salita Ukol kay Kapitan Tiyago", "Si Juli (Huli)", "Ang Mataas na Kawani", "Ang Ibinunga ng mga Paskin", "Ang Huling Matuwid", "Ang Kasal", "Ang Pista", "Ang Kagipitan ni Ben Zayb", "Ang Hiwaga", "Ang Kasawian", "Wakas"];
function sh(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function start(){let ord=[...Array(39).keys()].map(i=>i+1);sh(ord);let idx=0;function show(){let n=ord[idx],c=titles[n-1],o=[c];while(o.length<4){let r=titles[Math.floor(Math.random()*39)];if(!o.includes(r))o.push(r)}sh(o);g.innerHTML=`<h3>Question ${idx+1}/39</h3><p><b>Ano ang pamagat ng Kabanata ${n}?</b></p>`;o.forEach(v=>{let b=document.createElement('button');b.textContent=v;b.onclick=()=>{if(v===c){idx++;if(idx===39){alert('Perfect! Restarting...');start();}else show();}else{alert('Mali! Restarting...');start();}};g.appendChild(b);})}show();}start();</script></body></html>
